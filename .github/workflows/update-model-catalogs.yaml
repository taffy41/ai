name: Update Model Catalogs

on:
    schedule:
        # Mondays at 06:00 UTC
        - cron: '0 6 * * 1'
    workflow_dispatch:

# Least privilege by default; the job below opts into exactly what it needs.
permissions: {}

concurrency:
    group: ${{ github.workflow }}
    cancel-in-progress: false

env:
    PHP_VERSION: '8.5'

jobs:
    update:
        name: Refresh catalogs and open PR
        runs-on: ubuntu-latest
        permissions:
            contents: write
            pull-requests: write
        steps:
            - name: Checkout
              uses: actions/checkout@v6
              with:
                  persist-credentials: false

            - name: Setup PHP
              uses: shivammathur/setup-php@v2
              with:
                  php-version: ${{ env.PHP_VERSION }}
                  tools: flex

            - name: Install root dependencies
              run: composer install --no-interaction --no-progress --prefer-dist

            - name: Install platform dependencies
              run: composer install -d src/platform --no-interaction --no-progress --prefer-dist

            - name: Update catalogs from upstream metadata
              run: php src/platform/dev/update-model-catalogs.php

            - name: Fix code style
              run: vendor/bin/php-cs-fixer fix src/platform/src/Bridge

            - name: Run catalog tests
              run: |
                  src/platform/vendor/bin/phpunit -c src/platform \
                    src/platform/src/Bridge/Anthropic/Tests/ModelCatalogTest.php \
                    src/platform/src/Bridge/OpenAi/Tests/ModelCatalogTest.php \
                    src/platform/src/Bridge/Gemini/Tests/ModelCatalogTest.php \
                    src/platform/src/Bridge/Mistral/Tests/ModelCatalogTest.php \
                    src/platform/src/Bridge/DeepSeek/Tests/ModelCatalogTest.php \
                    src/platform/src/Bridge/Cohere/Tests/ModelCatalogTest.php \
                    src/platform/src/Bridge/Perplexity/Tests/ModelCatalogTest.php \
                    src/platform/src/Bridge/Cerebras/Tests/ModelCatalogTest.php \
                    src/platform/src/Bridge/OpenRouter/Tests/ModelCatalogTest.php

            - name: Create pull request
              uses: peter-evans/create-pull-request@v8
              with:
                  commit-message: '[Platform] Update model catalogs from upstream metadata'
                  author: 'github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>'
                  committer: 'github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>'
                  branch: automation/update-model-catalogs
                  delete-branch: true
                  title: '[Platform] Update model catalogs'
                  body: |
                      | Q             | A
                      | ------------- | ---
                      | Bug fix?      | no
                      | New feature?  | yes
                      | Docs?         | no
                      | Issues        | -
                      | License       | MIT

                      Automated refresh of the bridge `ModelCatalog` static lists from upstream metadata
                      (models.dev for per-provider bridges, the OpenRouter API for OpenRouter).

                      New models are appended; hand-curated entries are left untouched. Review the diff
                      before merging, and adjust capabilities or model classes where the heuristics need
                      a human.
